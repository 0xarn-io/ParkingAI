# ParkingAI configuration.
# Any value can be overridden by an env var, e.g. PARKINGAI_SERVER__PORT=9000.

camera:
  # Your RTSP camera. Tip: keep credentials out of git by setting
  #   export PARKINGAI_CAMERA__SOURCE="rtsp://user:pass@host:554/stream1"
  # and removing the URL below.
  source: "rtsp://street:12345678@192.168.1.50:554/stream1"
  rtsp_tcp: true
  reconnect_delay: 3.0
  loop_file: true       # only relevant when source is a video file

detector:
  model: "yolov8n.pt"   # smallest/fastest; great starting point for a Pi
  confidence: 0.35
  iou: 0.5
  device: "auto"        # auto -> cuda if available else cpu
  classes: [2, 3, 5, 7] # COCO: car, motorcycle, bus, truck
  imgsz: 640

occupancy:
  coverage_threshold: 0.15  # fraction of a spot a car must cover to be "occupied"
  smoothing_frames: 3       # consecutive detections needed before a state flips

server:
  host: "0.0.0.0"
  port: 8000
  jpeg_quality: 80
  stream_fps: 12.0

zones_file: "zones.json"
detect_interval: 1.0   # run YOLO at most once per second (lower CPU on a Pi)
